<!DOCTYPE html>

<body>


<div class="formulario-container">

🐾 Crear cuenta
</h1>


<p>
Registrate para proteger a tus mascotas.
</p>


<form>


<label>
Nombre
</label>

Crear cuenta

</button>


</form>

¿Ya tenés cuenta?

Ingresar
</a>

</div>


</div>
